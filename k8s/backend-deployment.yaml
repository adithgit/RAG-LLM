apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawracle-backend
  labels:
    app: lawracle-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lawracle-backend
  template:
    metadata:
      labels:
        app: lawracle-backend
    spec:
      containers:
      - name: backend
        image: lawracle-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "4Gi"
            cpu: "2"
          requests:
            memory: "10Mi"
            cpu: "10m"
        volumeMounts:
        - name: chroma-data
          mountPath: /app/chroma_db
        # Model is baked into the Docker image via Dockerfile RUN step
      volumes:
      - name: chroma-data
        persistentVolumeClaim:
          claimName: lawracle-chroma-pvc
