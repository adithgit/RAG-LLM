apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawracle-backend
  labels:
    app: lawracle-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lawracle-backend
  template:
    metadata:
      labels:
        app: lawracle-backend
    spec:
      containers:
      - name: backend
        image: lawracle-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
        resources:
          limits:
            memory: "4Gi"
            cpu: "2"
          requests:
            memory: "2Gi"
            cpu: "1"
        volumeMounts:
        - name: chroma-data
          mountPath: /app/chroma_db
        - name: model-cache
          mountPath: /app/model_cache
        # If deploying sample data, you could mount it here too
      volumes:
      - name: chroma-data
        persistentVolumeClaim:
          claimName: lawracle-chroma-pvc
      - name: model-cache
        persistentVolumeClaim:
          claimName: lawracle-model-cache-pvc
