apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lawracle-chroma-pvc
  labels:
    app: lawracle-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lawracle-model-cache-pvc
  labels:
    app: lawracle-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
