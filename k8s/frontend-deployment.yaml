apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawracle-frontend
  labels:
    app: lawracle-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lawracle-frontend
  template:
    metadata:
      labels:
        app: lawracle-frontend
    spec:
      containers:
      - name: frontend
        image: lawracle-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
