---
- name: Deploy Lawracle MLOps Pipeline to Kubernetes
  hosts: k8s_master
  become: no
  vars:
    k8s_dir: "/tmp/lawracle_k8s_{{ ansible_user_id }}"
    # These vars should be passed by Jenkins:
    # backend_image: "johndoe/lawracle-backend:latest"
    # frontend_image: "johndoe/lawracle-frontend:latest"

  tasks:
    - name: Ensure Kubernetes manifest directory exists
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Kubernetes manifests to master node
      copy:
        src: "../k8s/"
        dest: "{{ k8s_dir }}/"

    - name: Apply Persistent Volume Claims
      command: kubectl apply --validate=false -f {{ k8s_dir }}/volumes.yaml
      register: apply_pvc
      until: apply_pvc.rc == 0
      retries: 5
      delay: 10

    - name: Update backend deployment image
      replace:
        path: "{{ k8s_dir }}/backend-deployment.yaml"
        regexp: 'image: lawracle-backend:latest'
        replace: 'image: {{ backend_image }}'
      when: backend_image is defined

    - name: Update frontend deployment image
      replace:
        path: "{{ k8s_dir }}/frontend-deployment.yaml"
        regexp: 'image: lawracle-frontend:latest'
        replace: 'image: {{ frontend_image }}'
      when: frontend_image is defined

    - name: Apply Deployments and Services
      command: kubectl apply --validate=false -f {{ k8s_dir }}/backend-deployment.yaml -f {{ k8s_dir }}/frontend-deployment.yaml -f {{ k8s_dir }}/services.yaml
      register: apply_deploy
      until: apply_deploy.rc == 0
      retries: 5
      delay: 10

    - name: Wait for backend deployment to finish rolling update
      command: kubectl rollout status deployment/lawracle-backend --timeout=600s
      
    - name: Wait for frontend deployment to finish rolling update
      command: kubectl rollout status deployment/lawracle-frontend --timeout=120s

    - name: Deploy ELK Stack - Create logging namespace and apply manifests
      command: kubectl apply --validate=false -f {{ k8s_dir }}/elk/
      register: apply_elk
      until: apply_elk.rc == 0
      retries: 5
      delay: 10

    - name: Wait for Elasticsearch to be ready
      command: kubectl rollout status deployment/elasticsearch -n logging --timeout=300s

    - name: Wait for Logstash to be ready
      command: kubectl rollout status deployment/logstash -n logging --timeout=300s

    - name: Wait for Kibana to be ready
      command: kubectl rollout status deployment/kibana -n logging --timeout=300s
